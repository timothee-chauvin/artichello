<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Artichello — Table Soccer Elo</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
</head>

<body>
  <!-- Auth Screen -->
  <div id="auth-screen" class="auth-screen">
    <div class="auth-box">
      <h1>Artichello</h1>
      <p>Enter your GitHub Personal Access Token to continue.</p>
      <form id="auth-form">
        <input type="password" id="pat-input" placeholder="ghp_..." required>
        <button type="submit">Login</button>
      </form>
    </div>
  </div>

  <!-- Main Screen -->
  <div id="main-screen" style="display:none">
    <header>
      <h1>Artichello</h1>
      <div class="header-actions">
        <button id="btn-refresh" class="btn-secondary">Refresh</button>
        <button id="btn-logout" class="btn-secondary">Logout</button>
      </div>
    </header>

    <div id="status" class="status"></div>

    <section id="leaderboard-section">
      <h2>Leaderboard</h2>
      <table id="leaderboard">
        <thead>
          <tr>
            <th>#</th>
            <th>Player</th>
            <th>Elo</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </section>

    <section id="add-game-section">
      <h2>Add Game</h2>
      <div class="game-form">
        <div class="team-select">
          <h3>Team A <em id="team-a-elo" class="team-elo"></em></h3>
          <div id="players-a" class="player-checkboxes"></div>
          <input type="number" id="score-a" min="0" max="10" placeholder="Score">
        </div>
        <div class="vs">
          vs
          <div id="expected-score"></div>
        </div>
        <div class="team-select">
          <h3>Team B <em id="team-b-elo" class="team-elo"></em></h3>
          <div id="players-b" class="player-checkboxes"></div>
          <input type="number" id="score-b" min="0" max="10" placeholder="Score">
        </div>
      </div>
      <button id="btn-add-game" class="btn-primary">Submit Game</button>
    </section>

    <section id="chart-section">
      <h2>Elo Over Time</h2>
      <canvas id="elo-chart"></canvas>
    </section>

    <section id="add-player-section">
      <h2>Add Player</h2>
      <div class="add-player-form">
        <input type="text" id="new-player-name" placeholder="Player name">
        <button id="btn-add-player" class="btn-primary">Add</button>
      </div>
    </section>

    <section id="game-history-section">
      <h2>Game History</h2>
      <div id="game-history-list"></div>
    </section>
  </div>

  <script src="main.js"></script>
</body>

</html>
